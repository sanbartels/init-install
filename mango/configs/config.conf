# ============================================================================
# MangoWM config — guía comentada en español
# Referencia oficial: https://github.com/DreamMaoMao/mango/wiki/
# Recarga sin reiniciar sesión: Super + R
#
# IMPORTANTE: El parser de mango NO acepta comentarios al lado de los valores.
# Todos los comentarios deben ir en su propia línea, empezando con #
# ============================================================================

# Timezone
env=TZ,America/Argentina/Buenos_Aires

# GNOME Keyring
env=GNOME_KEYRING_CONTROL,/run/user/1000/keyring
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# ============================================================================
# EFECTOS DE VENTANA (glassmorphism)
# ============================================================================

# --- Blur (desenfoque detrás de ventanas translúcidas) ---

# 1=activar blur, 0=desactivar
blur=1
# 1=blur también en capas (panel Noctalia), 0=solo ventanas
blur_layer=0
# 1=modo optimizado (más rápido), 0=calidad máxima
blur_optimized=1
# Nº de pasadas — más = más suave (rango típico 1-5)
blur_params_num_passes=2
# Radio de difuminado en px — más alto = más borroso
blur_params_radius=4
# Ruido 0.0-1.0 — rompe el banding en degradados (0 = sin pixelado)
blur_params_noise=0
# Brillo del blur (1.0=neutro, <1 oscurece, >1 aclara)
blur_params_brightness=0.95
# Contraste del blur (1.0=neutro)
blur_params_contrast=0.95
# Saturación del blur (1.0=neutro, >1 colores más vivos)
blur_params_saturation=1.2

# --- Sombras (actualmente desactivadas) ---

# 1=activar sombras, 0=desactivar
shadows=0
# 1=sombras también en capas (panels), 0=solo ventanas
layer_shadows=0
# 1=solo flotantes tienen sombra, 0=todas
shadow_only_floating=1
# Tamaño/extensión en px
shadows_size=0
# Desenfoque del borde de la sombra
shadows_blur=0
# Desplazamiento horizontal (+derecha, -izquierda)
shadows_position_x=0
# Desplazamiento vertical (+abajo, -arriba)
shadows_position_y=0
# Color formato 0xRRGGBBAA (aa=alpha)
shadowscolor=0x00000000

# --- Bordes redondeados y opacidad ---

# Radio de esquinas en px (0=cuadradas, 12-20=muy redondeadas)
border_radius=12
# 1=sin redondeo si solo hay una ventana visible
no_radius_when_single=0
# Opacidad ventana enfocada (1.0=opaca)
focused_opacity=1.0
# Opacidad ventana sin foco
unfocused_opacity=0.97


# ============================================================================
# ANIMACIONES
# ============================================================================

# 1=animaciones activas, 0=instantáneo
animations=1
# 1=animar también capas (panel Noctalia, etc.)
layer_animations=1
# Animación al abrir: zoom | slide | none
animation_type_open=zoom
# Animación al cerrar
animation_type_close=zoom
# 1=fundido entrada al abrir
animation_fade_in=1
# 1=fundido salida al cerrar
animation_fade_out=1
# Dirección al cambiar tag: 1=horizontal, 0=vertical
tag_animation_direction=1

# --- Ratios de zoom (solo si animation_type_* = zoom) ---

# Tamaño al inicio (0.5 = 50%)
zoom_initial_ratio=0.5
# Tamaño al final (1.0 = 100%)
zoom_end_ratio=1.0

# --- Opacidades durante fade ---

# Opacidad inicial del fade-in (0=invisible)
fadein_begin_opacity=0.0
# Opacidad inicial del fade-out (1=opaco)
fadeout_begin_opacity=1.0

# --- Duraciones en milisegundos (menor = más rápido) ---

# Mover ventana entre posiciones
animation_duration_move=400
# Al abrir una ventana
animation_duration_open=350
# Al cambiar de tag/workspace
animation_duration_tag=300
# Al cerrar una ventana
animation_duration_close=300
# Al cambiar foco
animation_duration_focus=150

# --- Curvas de aceleración (bezier: x1,y1,x2,y2) ---
# linear = 0,0,1,1
# ease-out = 0,0,0.58,1
# ease-in-out = 0.42,0,0.58,1

animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1


# ============================================================================
# LAYOUTS (disposición de ventanas)
# ============================================================================

# --- Scroller: layout tipo "cinta horizontal" ---

# Máximo de ventanas en la cinta
scroller_structs=20
# Proporción por defecto (0.8 = 80% del ancho)
scroller_default_proportion=0.8
# 1=centrar ventana enfocada
scroller_focus_center=0
# 1=preferir centro al abrir nueva ventana
scroller_prefer_center=0
# 1=cambiar foco al mover puntero al borde
edge_scroller_pointer_focus=1
# Proporción cuando solo hay una ventana
scroller_default_proportion_single=1.0
# Presets para Alt+X (cicla entre ellos)
scroller_proportion_preset=0.5,0.8,1.0

# --- Master-Stack: ventana principal + pila lateral ---

# 1=ventana nueva va al master
new_is_master=1
# % de ancho del master (0.55 = 55%)
default_mfact=0.55
# Nº de ventanas en el master
default_nmaster=1
# 1=sin gaps cuando solo hay una ventana
smartgaps=0


# ============================================================================
# OVERVIEW (vista general — Alt+Tab)
# ============================================================================

# Tamaño en px de la zona caliente (esquinas)
hotarea_size=10
# 1=hover en esquina abre overview
enable_hotarea=1
# 0=overview completo, 1=solo ventanas del tag actual
ov_tab_mode=0
# Gap interno entre ventanas en overview
overviewgappi=8
# Gap externo (desde borde de pantalla)
overviewgappo=40


# ============================================================================
# COMPORTAMIENTO GENERAL
# ============================================================================

# 1=sin borde si solo hay una ventana
no_border_when_single=0
# Timeout (ms) entre acciones del scroll bindings
axis_bind_apply_timeout=100
# 1=dar foco a ventana que se active (notificación, etc.)
focus_on_activate=1
# 1=ignorar inhibidores cuando no están visibles
idleinhibit_ignore_visible=0
# 1=foco sigue al puntero, 0=solo click
sloppyfocus=1
# 1=el puntero salta a ventana enfocada
warpcursor=1
# 1=cambiar foco puede cruzar al otro monitor
focus_cross_monitor=0
# 1=cambiar foco puede cruzar entre tags
focus_cross_tag=0
# 1=ventanas flotantes se enganchan a bordes
enable_floating_snap=0
# Distancia (px) para "snap"
snap_distance=30
# Tamaño del cursor del ratón (px)
cursor_size=24
# 1=arrastrar ventana tiled reordena el layout
drag_tile_to_tile=1


# ============================================================================
# TECLADO
# ============================================================================

# Teclas por segundo cuando mantienes pulsado
repeat_rate=25
# Ms antes de empezar a repetir
repeat_delay=600
# 1=NumLock activo al arrancar
numlockon=0
# Layout: us | es | latam | ...
xkb_rules_layout=us
# Para US-international (acentos):
xkb_rules_variant=intl


# ============================================================================
# TRACKPAD — requiere re-login para aplicar
# ============================================================================

# 1=desactivar trackpad
disable_trackpad=0
# 1=tocar = click
tap_to_click=1
# 1=doble-tap y arrastrar = click+drag
tap_and_drag=1
# 1=mantiene drag aunque levantes el dedo un instante
drag_lock=1
# 1=scroll invertido (Mac), 0=tradicional
trackpad_natural_scrolling=0
# 1=deshabilitar trackpad mientras escribes
disable_while_typing=1
# 1=intercambiar botones izq/der
left_handed=0
# 1=izq+der = middle click
middle_button_emulation=0
# Sensibilidad gestos swipe
swipe_min_threshold=1


# ============================================================================
# RATÓN
# ============================================================================

# 1=scroll invertido
mouse_natural_scrolling=0


# ============================================================================
# APARIENCIA / GAPS / BORDES
# ============================================================================

# --- Gaps (separación entre ventanas y bordes) ---

# Gap interno horizontal (entre ventanas, izq/der)
gappih=4
# Gap interno vertical (entre ventanas, arriba/abajo)
gappiv=4
# Gap externo horizontal (bordes izq/der de pantalla)
gappoh=0
# Gap externo vertical (bordes arriba/abajo de pantalla)
gappov=0

# --- Scratchpad (ventana pop-up con Alt+Z) ---

# Ancho como % de pantalla (0.8 = 80%)
scratchpad_width_ratio=0.8
# Alto como %
scratchpad_height_ratio=0.9

# --- Bordes ---

# Grosor del borde de ventana en px (0=sin borde)
borderpx=1

# --- Colores (formato 0xRRGGBBAA, aa=alpha) ---

# Fondo del compositor (si no hay wallpaper)
rootcolor=0x101015ff
# Borde de ventana sin foco
bordercolor=0x44444466
# Borde de ventana con foco (azul Catppuccin)
focuscolor=0x89b4faff
# Borde cuando está maximizada (verde)
maximizescreencolor=0xa6e3a1ff
# Borde cuando la ventana pide atención (rosa)
urgentcolor=0xf38ba8ff
# Borde del scratchpad (cyan)
scratchpadcolor=0x89dcebff
# Borde de ventana "global" (visible en todos los tags, morado)
globalcolor=0xcba6f7ff
# Borde de ventana en modo overlay (teal)
overlaycolor=0x94e2d5ff


# ============================================================================
# DISPOSICIÓN DE MONITORES
# Formato: monitorrule=name:NOMBRE,x:POSX,y:POSY,width:W,height:H,refresh:HZ,scale:N
# Lista tus monitores con: wlr-randr
# Opciones extra:
#   scale:1.5   (HiDPI)
#   rr:1..7     (rotación/flip)
#   vrr:1       (variable refresh rate, para gaming)
#   custom:1    (usar modo personalizado aunque no esté en la lista de modos)
# ============================================================================

# Dell P2719HC (HDMI) físicamente a la izquierda
monitorrule=name:HDMI-A-1,x:0,y:0,width:1920,height:1080,refresh:60.0,scale:1.0
# Laptop (eDP-1) físicamente a la derecha (x=1920 porque el Dell tiene 1920 de ancho)
monitorrule=name:eDP-1,x:1920,y:0,width:1920,height:1080,refresh:144.003,scale:1.0


# ============================================================================
# LAYOUTS POR TAG (workspace)
# Opciones: tile | scroller | grid | deck | monocle | center_tile
#           vertical_tile | vertical_scroller
# ============================================================================

tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile


# ============================================================================
# AUTOSTART — programas que arrancan con MangoWM
# exec-once = se lanza una sola vez al iniciar la sesión
# exec      = se lanza cada vez que se recarga el config (útil para scripts)
# ============================================================================

# NOTA: pipewire/wireplumber los maneja systemd --user — NO lanzarlos aquí
# (causaría error "device busy" por duplicación)

# Portal de escritorio (necesario para pegar imágenes en chats y apps Wayland)
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=wlroots
exec-once=systemctl --user start xdg-desktop-portal xdg-desktop-portal-wlr

# Agente de autenticación (pide permisos gráficos)
exec-once=/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# Icono de red en bandeja
exec-once=nm-applet --indicator
# Wallpaper de fondo (Noctalia lo sobreescribe)
exec-once=swaybg -m fill -i ~/Pictures/Wallpapers/
# Daemon de notificaciones
exec-once=mako
# Noctalia Shell (barra, widgets, wallpaper manager)
exec-once=qs -c noctalia-shell
# Network Manager Applet para gestión de red desde la bandeja del sistema
exec-once = nm-applet --indicator

# Montaje automático de USB y dispositivos extraíbles
exec-once = udiskie --tray

# GNOME Keyring Daemon
exec-once = dbus-update-activation-environment --all
exec-once = gnome-keyring-daemon --start --components=secrets

# ============================================================================
# ATAJOS DE TECLADO
#
# Formato: bind=MODS,TECLA,FUNCION,ARGUMENTO
# Modificadores: SUPER (Windows) | ALT | CTRL | SHIFT | NONE
# Combinaciones con +  (ej: SUPER+SHIFT)
# Para ver códigos de teclas: instala `wev` y ejecútalo en una terminal
# ============================================================================

# --- Sistema ---

# Recarga el config sin reiniciar sesión
bind=SUPER,r,reload_config
# Cierra la sesión MangoWM (vuelve al login)
bind=SUPER+SHIFT,m,quit
# Apaga la PC
bind=SUPER+SHIFT,p,spawn,systemctl poweroff
# Reinicia la PC
bind=SUPER+SHIFT,r,spawn,systemctl reboot

# --- Aplicaciones ---

# Terminal (kitty — soporta imágenes nativas HD vía kitty-graphics)
bind=Alt,Return,spawn,kitty
# Launcher de aplicaciones (Noctalia)
bind=SUPER,Return,spawn,qs -c noctalia-shell ipc call launcher toggle
# Cerrar ventana activa
bind=SUPER,q,killclient,

# --- Aplicaciones con NVIDIA (prime-run) ---
# Discord acelerado con RTX 4050
bind=SUPER,d,spawn,discord --enable-features=WebRTCPipeWireCapturer --ozone-platform-hint=auto
# Firefox con NVIDIA (WebGL, video decode por HW)
bind=SUPER,g,spawn,google-chrome-stable
# Terminal con NVIDIA (útil para correr ML, CUDA, mpv con nvdec, etc.)
bind=SUPER,t,spawn,kitty
# YouTube Music (PWA Chrome)
bind=SUPER,y,spawn,/opt/google/chrome/google-chrome --profile-directory=Default --app-id=cinhimbnkkaeohfgghhklpknlkffjgod
# Neovim directo en kitty con NVIDIA
bind=SUPER,v,spawn,kitty -e nvim
# Explorador de archivos yazi en kitty
bind=SUPER,e,spawn,kitty --class yazi -e yazi

# --- Teclas multimedia (teclado + auriculares USB) ---

# Volumen
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Reproducción
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioPause,spawn,playerctl play-pause
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPrev,spawn,playerctl previous
bind=NONE,XF86AudioStop,spawn,playerctl stop

# --- Capturas de pantalla ---

bind=NONE,Print,spawn,flameshot gui

# --- Foco entre ventanas ---

# Ciclar a la siguiente ventana
bind=SUPER,Tab,focusstack,next
# Foco a la ventana de la izquierda
bind=ALT,Left,focusdir,left
# Foco a la derecha
bind=ALT,Right,focusdir,right
# Foco arriba
bind=ALT,Up,focusdir,up
# Foco abajo
bind=ALT,Down,focusdir,down

# --- Intercambiar posición de ventanas ---

bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# --- Estado de ventana ---

# Ventana visible en todos los tags
bind=SUPER,g,toggleglobal,
# Vista general de ventanas
bind=ALT,Tab,toggleoverview,
# Flotante / tiled
bind=ALT,backslash,togglefloating,
# Maximizar a pantalla (respeta panels)
bind=ALT,a,togglemaximizescreen,
# Fullscreen (sobre panels)
bind=ALT,f,togglefullscreen,
# Fullscreen sin salir del tiling
bind=ALT+SHIFT,f,togglefakefullscreen,
# Minimizar ventana
bind=SUPER,i,minimized,
# Modo overlay (siempre encima)
bind=SUPER,o,toggleoverlay,
# Restaurar ventanas minimizadas
bind=SUPER+SHIFT,I,restore_minimized
# Abrir/ocultar scratchpad
bind=ALT,z,toggle_scratchpad

# --- Scroller (layout cinta) ---

# Ventana ocupa 100% de la pantalla
bind=ALT,e,set_proportion,1.0
# Cicla entre scroller_proportion_preset
bind=ALT,x,switch_proportion_preset,

# --- Cambio de layout ---

# Siguiente layout (tile → scroller → grid...)
bind=SUPER,n,switch_layout

# --- Cambiar entre tags (workspaces) ---

# Tag anterior
bind=SUPER,Left,viewtoleft,0
# Tag anterior que tenga ventanas
bind=CTRL,Left,viewtoleft_have_client,0
# Tag siguiente
bind=SUPER,Right,viewtoright,0
# Tag siguiente que tenga ventanas
bind=CTRL,Right,viewtoright_have_client,0
# Mover ventana al tag anterior
bind=CTRL+SUPER,Left,tagtoleft,0
# Mover ventana al tag siguiente
bind=CTRL+SUPER,Right,tagtoright,0

# Ir al tag N (Ctrl+1..9)
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# Mover ventana al tag N (Alt+1..9)
# Alternativa: "tagsilent" en vez de "tag" — mueve sin cambiar tu vista
bind=Alt,1,tag,1,0
bind=Alt,2,tag,2,0
bind=Alt,3,tag,3,0
bind=Alt,4,tag,4,0
bind=Alt,5,tag,5,0
bind=Alt,6,tag,6,0
bind=Alt,7,tag,7,0
bind=Alt,8,tag,8,0
bind=Alt,9,tag,9,0

# --- Multi-monitor ---

# Foco al monitor de la izquierda
bind=alt+shift,Left,focusmon,left
# Foco al monitor de la derecha
bind=alt+shift,Right,focusmon,right
# Mover ventana al monitor izquierdo
bind=SUPER+Alt,Left,tagmon,left
# Mover ventana al monitor derecho
bind=SUPER+Alt,Right,tagmon,right

# --- Gaps (separación entre ventanas) ---

# +1 px a los gaps
bind=ALT+SHIFT,X,incgaps,1
# -1 px a los gaps
bind=ALT+SHIFT,Z,incgaps,-1
# Activar/desactivar gaps
bind=ALT+SHIFT,R,togglegaps

# --- Mover ventana flotante con teclado (paso: 50 px) ---

bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# --- Redimensionar ventana flotante (paso: 50 px) ---

bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0


# ============================================================================
# ATAJOS DE RATÓN
# Botones: btn_left | btn_middle | btn_right
# ============================================================================

# Super + click-izq arrastrar = mover ventana
mousebind=SUPER,btn_left,moveresize,curmove
# Click central (sin modificador) = maximizar
mousebind=NONE,btn_middle,togglemaximizescreen,0
# Super + click-der arrastrar = redimensionar
mousebind=SUPER,btn_right,moveresize,curresize


# ============================================================================
# SCROLL / RUEDA DEL RATÓN
# UP = scroll hacia arriba, DOWN = scroll hacia abajo
# ============================================================================

# Super + scroll arriba = tag anterior (con ventanas)
axisbind=SUPER,UP,viewtoleft_have_client
# Super + scroll abajo = tag siguiente (con ventanas)
axisbind=SUPER,DOWN,viewtoright_have_client


# ============================================================================
# REGLAS DE CAPAS (para panels, launchers, notificaciones)
# layer_name se puede debuggear con: MANGO_DEBUG=1 mango
# ============================================================================

# Animación zoom en el popup de Fuzzel
layerrule=animation_type_open:zoom,layer_name:fuzzel
layerrule=animation_type_close:zoom,layer_name:fuzzel


# ============================================================================
# REGLAS DE VENTANA
# Formato: windowrule=REGLA,appid:APPID
# ============================================================================

# Kitty: respetar la opacidad declarada por la app (background_opacity 0.85)
windowrule=opacity:0.85 0.82,appid:kitty

# MPV: abrir audio/video desde Yazi como ventana flotante
windowrule=isfloating:1,width:800,height:450,appid:mpv

# Yazi: abrir el explorador como ventana flotante
windowrule=isfloating:1,width:1000,height:700,appid:yazi
