###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = kitty --class yazi -e yazi
$menu = $HOME/.config/rofi/launchers/type-7/launcher.sh
$runOrNotify = $HOME/.config/hypr/run-or-notify


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Screenshots and screen recording
bind = , Print, exec, $runOrNotify flameshot -- flameshot gui
bind = $mainMod, R, exec, $runOrNotify wf-recorder slurp rofi -- $HOME/.config/hypr/record-screen.sh

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $runOrNotify rofi -- $menu
bind = $mainMod, T, exec, $runOrNotify kitty -- $terminal
bind = $mainMod SHIFT, T, exec, $runOrNotify ghostty -- ghostty
bind = $mainMod SHIFT, Q, killactive, # Close active window
bind = $mainMod SHIFT, M, exec, $runOrNotify hyprctl -- hyprctl dispatch exit
bind = $mainMod SHIFT, R, exec, $runOrNotify systemctl -- systemctl reboot
bind = $mainMod, E, exec, $runOrNotify kitty yazi -- $fileManager
bind = $mainMod, U, exec, $runOrNotify kitty yazi -- kitty --class yazi-usb -e yazi /run/media/$USER
bind = $mainMod, D, exec, $runOrNotify discord -- discord --enable-features=WebRTCPipeWireCapturer --ozone-platform-hint=auto
bind = $mainMod SHIFT, G, exec, $runOrNotify google-chrome-stable -- google-chrome-stable --remote-debugging-address=127.0.0.1 --remote-debugging-port=9222 --user-data-dir=$HOME/.config/google-chrome-pi-debug --no-first-run --no-default-browser-check
bind = $mainMod, G, exec, $runOrNotify /opt/google/chrome/google-chrome -- /opt/google/chrome/google-chrome
bind = $mainMod, Y, exec, $runOrNotify /opt/google/chrome/google-chrome -- /opt/google/chrome/google-chrome --app-id=cinhimbnkkaeohfgghhklpknlkffjgod #Open YoutubeMusic
bind = $mainMod, V, exec, $runOrNotify kitty nvim -- kitty -e nvim
bind = $mainMod, C, exec, $runOrNotify cliphist rofi wl-copy -- $HOME/.config/hypr/clipboard-history.sh # Clipboard history
bind = $mainMod, W, exec, $runOrNotify rofi xdg-open python3 -- $HOME/.config/hypr/web-spotlight.sh # Web Spotlight
bind = $mainMod, P, exec, $runOrNotify fd rg rofi git -- $HOME/.config/hypr/find-open.sh --projects # Find projects
bind = $mainMod SHIFT, P, exec, $runOrNotify systemctl -- systemctl poweroff
bind = $mainMod, N, exec, $runOrNotify kitty nvim -- $HOME/.config/hypr/open-quick-note.sh # Quick note
bind = $mainMod SHIFT, N, exec, $runOrNotify eww -- $HOME/.config/eww/scripts/toggle-notes-preview # View notes
bind = $mainMod, Space, exec, $runOrNotify kitty -- $HOME/.config/hypr/quick-terminal.sh # Quick terminal
bind = $mainMod SHIFT, F, exec, $runOrNotify fd rg rofi git -- $HOME/.config/hypr/find-open.sh --files # Find files
bind = $mainMod, backslash, exec, $runOrNotify hyprctl jq -- $HOME/.config/hypr/toggle-floating-centered.sh
bind = $mainMod, F, fullscreen,
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
bind = $mainMod, I, exec, $runOrNotify eww -- $HOME/.config/eww/scripts/toggle-system-widget
bind = $mainMod, O, exec, $runOrNotify eww -- $HOME/.config/eww/scripts/toggle-ai-quota
bind = $mainMod, K, exec, $runOrNotify eww -- $HOME/.config/eww/scripts/toggle-keybinds-cheatsheet

# Graphical volume control
bind = $mainMod, A, exec, $runOrNotify pavucontrol -- pavucontrol
bind = $mainMod, B, exec, $runOrNotify kitty btop -- kitty --class btop -e btop
bind = $mainMod SHIFT, A, exec, $runOrNotify pactl -- $HOME/.config/hypr/toggle-audio-output.sh

# Move focus with ALT + arrow keys
bind = ALT, Left, movefocus, l
bind = ALT, Right, movefocus, r
bind = ALT, Up, movefocus, u
bind = ALT, Down, movefocus, d

# Resize active window with CTRL + SHIFT + arrow keys
binde = CTRL SHIFT, Up, resizeactive, 0 -50
binde = CTRL SHIFT, Down, resizeactive, 0 50
binde = CTRL SHIFT, Left, resizeactive, -50 0
binde = CTRL SHIFT, Right, resizeactive, 50 0

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with ALT + [0-9]
bind = ALT, 1, movetoworkspace, 1
bind = ALT, 2, movetoworkspace, 2
bind = ALT, 3, movetoworkspace, 3
bind = ALT, 4, movetoworkspace, 4
bind = ALT, 5, movetoworkspace, 5
bind = ALT, 6, movetoworkspace, 6
bind = ALT, 7, movetoworkspace, 7
bind = ALT, 8, movetoworkspace, 8
bind = ALT, 9, movetoworkspace, 9
bind = ALT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, $runOrNotify wpctl -- wpctl set-volume -l 1.2 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, $runOrNotify wpctl -- wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, $runOrNotify wpctl -- wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, $runOrNotify wpctl -- wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, $runOrNotify brightnessctl -- brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, $runOrNotify brightnessctl -- brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, $runOrNotify playerctl -- playerctl next
bindl = , XF86AudioPause, exec, $runOrNotify playerctl -- playerctl play-pause
bindl = , XF86AudioPlay, exec, $runOrNotify playerctl -- playerctl play-pause
bindl = , XF86AudioPrev, exec, $runOrNotify playerctl -- playerctl previous


