###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = kitty --class yazi -e yazi
$menu = $HOME/.config/rofi/launchers/type-7/launcher.sh


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

#Capturas de pantalla
bind = , Print, exec, flameshot gui
bind = $mainMod, R, exec, $HOME/.config/hypr/record-screen.sh

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = ALT, Return, exec, $terminal
bind = $mainMod, Return, exec, $menu
bind = $mainMod, T, exec, $terminal
bind = $mainMod SHIFT, T, exec, ghostty
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, M, exec, hyprctl dispatch exit
bind = $mainMod SHIFT, P, exec, systemctl poweroff
bind = $mainMod SHIFT, R, exec, systemctl reboot
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, D, exec, discord --enable-features=WebRTCPipeWireCapturer --ozone-platform-hint=auto
bind = $mainMod SHIFT, G, exec, google-chrome-stable --remote-debugging-address=127.0.0.1 --remote-debugging-port=9222 --user-data-dir=$HOME/.config/google-chrome-pi-debug --no-first-run --no-default-browser-check
bind = $mainMod, G, exec, /opt/google/chrome/google-chrome
bind = $mainMod, Y, exec, /opt/google/chrome/google-chrome --app-id=cinhimbnkkaeohfgghhklpknlkffjgod
bind = $mainMod, V, exec, kitty -e nvim
bind = $mainMod, backslash, togglefloating,
bind = $mainMod, F, fullscreen,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
bind = $mainMod, I, exec, $HOME/.config/eww/scripts/toggle-system-widget

# Control de volumen gráfico
bind = $mainMod, A, exec, pavucontrol
bind = $mainMod SHIFT, A, exec, $HOME/.config/hypr/toggle-audio-output.sh

# Move focus with ALT + arrow keys
bind = ALT, Left, movefocus, l
bind = ALT, Right, movefocus, r
bind = ALT, Up, movefocus, u
bind = ALT, Down, movefocus, d

# Resize active window with CTRL + SHIFT + arrow keys
binde = CTRL SHIFT, Up, resizeactive, 0 -50
binde = CTRL SHIFT, Down, resizeactive, 0 50
binde = CTRL SHIFT, Left, resizeactive, -50 0
binde = CTRL SHIFT, Right, resizeactive, 50 0

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with ALT + [0-9]
bind = ALT, 1, movetoworkspace, 1
bind = ALT, 2, movetoworkspace, 2
bind = ALT, 3, movetoworkspace, 3
bind = ALT, 4, movetoworkspace, 4
bind = ALT, 5, movetoworkspace, 5
bind = ALT, 6, movetoworkspace, 6
bind = ALT, 7, movetoworkspace, 7
bind = ALT, 8, movetoworkspace, 8
bind = ALT, 9, movetoworkspace, 9
bind = ALT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.2 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


